ai_usage_summary: |
  Used OpenCode to implement the full ranking pipeline: feature engineering
  (skill taxonomy, title matching, career trajectory, behavioral signals), honeypot
  detection gates, scoring logic, and CSV output. No candidate data was fed to any LLM.

methodology_summary: |
  Rule-based ranker with 6 weighted components: skill taxonomy match (40%),
  title fit (12%), career trajectory (15%), experience bell-curve (15%),
  location (8%), behavioral signals (10%), with multiplicative behavioral modifier.
  Skills use a trust multiplier (proficiency x duration x endorsements) and logistic
  normalization against semi-saturation constant K=8. Title uses 4-tier taxonomy
  with substring matching. Career trajectory accounts for product/consulting company
  bonus, Tier-1 title bonus, job hopper penalty, and pure-research penalty.
  Behavioral modifier penalizes candidates who are not open-to-work, have low
  recruiter response rates, stale profiles, or long notice periods (floor 0.3).
  Honeypot gates: education timeline inversion, salary min>max, YOE<0 or >50,
  expert with zero skill duration. ~4.7s runtime for 100K candidates on CPU.

declarations:
  read_submission_spec: true
